<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>

    <style>

        @font-face {
            font-family: 'FiraCode';
            src: url(./FiraCode-Medium.ttf);
        }
        * {
            user-select: none;
            box-sizing: border-box;
            margin: 0 auto;
            font-family: 'FiraCode';
            font-size: 20px;
            text-align: center;
        }
        body {
            background-color: #121212;
        }
        .timer > div {
            margin-top: 120px;
            color: white;
            background-color: #181818;
            border-radius: 10px;
            border: 3px solid grey;
            display: inline-block;
            padding: 10px 0;
            width: 30%; 
            max-width: 100px;
        }

    </style>

</head>
<body>
    
    <section class="timer">

        <div>
            <div id="h">0</div>
            <div>hours</div>
        </div>

        <div>
            <div id="m">0</div>
            <div>minutes</div>
        </div>

        <div>
            <div id="s">0</div>
            <div>second</div>
        </div>

    </section>

    <script>

        let h = 0
        let m = 1
        let s = 5

        let hb = document.getElementById("h")
        let mb = document.getElementById("m")
        let sb = document.getElementById("s")

        setInterval(()=>{

            if (s > 0) {
                s--
            }
            else {
                if (m > 0) {
                    m--
                    s = 59
                }
                else {
                    if (h > 0) {
                        h--
                        m = 59
                        s = 59
                    }
                    else {
                        return
                    }
                }
            }

            sb.innerHTML = s
            mb.innerHTML = m
            hb.innerHTML = h
    
        },1000)

    </script>

</body>
</html>
