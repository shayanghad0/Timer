<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <style>

        @font-face {
            font-family: 'FiraCode';
            src: url(./FiraCode-Medium.ttf);
        }
        * {
            user-select: none;
            box-sizing: border-box;
            margin: 0 auto;
            font-family: 'FiraCode';
            font-size: 20px;
            text-align: center;
        }
        body {
            background-color: #121212;
        }
        .timer > div {
            margin-top: 120px;
            color: white;
            background-color: #222222;
            border-radius: 10px;
            display: inline-block;
            padding: 10px 0;
            width: 30%; 
            max-width: 100px;
        }
        .hidden {
            display: none;
        }
        #play, #reset {
            padding: 10px;
            text-align: center;
            font-family: "FiraCode";
            font-size: 20px;
            width: 60%;
            max-width: 155px;
            height: auto;
            color: white;
            background-color: #303030;
            outline: none;
            border: none;
            border-radius: 5px;
            transition: all 0.4s ease-in-out;
            display: inline-block;
            gap: 10px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #play:hover {
            background-color: #252525;
            transform: translateY(-2px);
        }
        #reset:hover {
            background-color: #252525;
            transform: translateY(-2px);
        }

    </style>

</head>

<body>

    <section class="timer">

        <div>
            <div id="h">1</div>
            <div>hours</div>
        </div>

        <div>
            <div id="m">5</div>
            <div>minutes</div>
        </div>

        <div>
            <div id="s">30</div>
            <div>second</div>
        </div>

    </section>
    
    <br>
    <div class="btns">
        <button onclick="play()" id="play"> start </button>
        <button class="hidden" id="reset">reset</button>
    </div>


    <script>

        let h = 0;
        let m = 0;
        let s = 0;

        let hb = document.getElementById("h");
        let mb = document.getElementById("m");
        let sb = document.getElementById("s");
        let btn = document.getElementById('play');
        let hid_btn = document.querySelector('#reset');
        clicked = false;
        st = {'click':false,remain_h:Number(hb.innerHTML),remain_m:Number(mb.innerHTML),remain_s:Number(sb.innerHTML),int:null};
        let min = 1;
        let play = () => {
            var int;
            h = Number(hb.innerHTML);
            m = Number(mb.innerHTML);
            s = Number(sb.innerHTML);
            min = 1;
            let run = () => {

                    if (s > 0) {
                        s-=min;
                    }
                    else {
                        if (m > 0) {
                            m-=min;
                            s = 59;
                        }
                        else {
                            if (h > 0) {
                                h-=min;
                                m = 59;
                                s = 59;
                            }
                            else {
                                return;
                            }
                        }
                    }

                    sb.innerHTML = s;
                    mb.innerHTML = m;
                    hb.innerHTML = h;
            }
            if (!st.clicked) {
                hid_btn.classList.remove('hidden')
                console.log(hid_btn);
                
                btn.innerHTML = 'stop';
                st.clicked = true;
                st.int = setInterval(run, 1000);
            }
            
            else{
                hid_btn.classList.add('hidden');
                clearInterval(st.int);
                st.int = null;
                st.clicked = false;
                min = null;
                btn.innerHTML = 'start'

            }
            hid_btn.addEventListener('click',() => {
                hid_btn.classList.add('hidden');
                clearInterval(st.int);
                st.int = null;
                st.clicked = false;
                min = null;
                btn.innerHTML = 'start';
                sb.innerHTML = '0';
                    mb.innerHTML = '5';
                    hb.innerHTML = '0';
            })
        }

    </script>


</body>
</html>
